<!doctype html>
<!--
  iTeacher first-run / onboarding flow — behaviour reference — wayfinder ticket #7 (RESOLVED).
  Composes the three settled decisions:
    (a) root selection  = show + confirm, default-accept. Resolved ABSOLUTE path shown
                          (copyable, terminal-reachable per #3), sync-folder detection
                          surfaced as subtitle, "Choose a different folder" -> native OS
                          picker (stubbed here), folder created on confirm.
    (b) hand-off        = guided-lite. Copyable starter prompt + copyable absolute path +
                          "open a terminal here and run claude" steps. The app spawns
                          NOTHING (stays a viewer, not an agent host, per #3).
    (c) in-between      = live-watch the root; the moment a workspace with MISSION.md
                          appears, auto-flip from the waiting state to the dashboard with a
                          one-time celebration. Then it is just #4's brand-new-topic rail.

  Throwaway prototype. Fixture only; no framework/build/server. Double-click to open.
  The dock at the bottom steps through the flow and fires the "a topic appeared" event
  that a real file-watcher would raise.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iTeacher first-run — flow reference</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#fff; --ink:#1a1d21; --muted:#6b7280; --faint:#9ca3af;
    --line:#e5e7eb; --accent:#3b5bdb; --accent-soft:#e7ecff;
    --done:#2f9e44; --done-soft:#e6f4ea; --progress:#f08c00; --ghost:#cbd2da;
    --radius:14px; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
    font-synthesis-weight:none;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
  .stage{max-width:960px;margin:0 auto;padding:32px 24px 110px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

  /* ---- shared card shell for the two full-screen onboarding steps ---- */
  .card{max-width:560px;margin:7vh auto;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 36px 32px}
  .card.dashed{border-style:dashed;box-shadow:none}
  .brand{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);
    font-weight:700;margin:0 0 18px}
  .card h2{margin:0 0 8px;font-size:20px;letter-spacing:-.01em}
  .card > p{color:var(--muted);font-size:13.5px;margin:0 0 6px}

  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none}
  .btn.block{width:100%;justify-content:center;padding:12px}
  .linkbtn{background:none;border:none;color:var(--accent);font-size:12.5px;font-weight:600;
    cursor:pointer;padding:6px 2px;text-decoration:none}

  /* ---- (a) resolved-path field ---- */
  .pathrow{display:flex;align-items:stretch;gap:8px;margin:16px 0 4px}
  .pathfield{flex:1;display:flex;align-items:center;background:#f2f4f7;border:1px solid var(--line);
    border-radius:10px;padding:11px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12.5px;color:var(--ink);overflow:auto;white-space:nowrap}
  .copy{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:0 14px;
    font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
  .copy:active{background:#eceef1}
  .copy.done{color:var(--done);border-color:var(--done-soft)}
  .detected{font-size:12px;color:var(--faint);margin:0 0 22px}
  .detected b{color:var(--muted);font-weight:600}

  /* ---- (b) guided-lite step list ---- */
  .steps{list-style:none;margin:20px 0 0;padding:0;counter-reset:s}
  .steps > li{position:relative;padding:0 0 20px 40px;counter-increment:s}
  .steps > li::before{content:counter(s);position:absolute;left:0;top:-1px;width:26px;height:26px;
    border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:12.5px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
  .steps > li:not(:last-child)::after{content:"";position:absolute;left:13px;top:28px;bottom:6px;
    width:2px;background:var(--line)}
  .steps .lbl{font-size:13.5px;margin:2px 0 8px}
  .steps .lbl code{background:#eceef1;padding:2px 8px;border-radius:6px;font-size:12px}
  .promptbox{display:flex;align-items:flex-start;gap:8px}
  .promptbox .pf{flex:1;background:#f2f4f7;border:1px solid var(--line);border-radius:10px;
    padding:11px 14px;font-size:13px;color:var(--ink);line-height:1.5}
  .promptbox .pf .fill{color:var(--accent);font-weight:600}

  .waiting{display:flex;align-items:center;gap:10px;margin:26px 0 0;padding-top:20px;
    border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
  .spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);
    border-top-color:var(--accent);animation:spin 900ms linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- (c) celebration flip -> dashboard w/ #4 brand-new rail ---- */
  .topbar{display:flex;align-items:baseline;gap:14px;margin-bottom:4px}
  .topbar h1{font-size:22px;margin:0;letter-spacing:-.01em}
  .topbar .sub{color:var(--muted);font-size:13px}
  .roothint{color:var(--faint);font-size:12px;margin:0 0 26px}
  .roothint code{background:#eceef1;padding:1px 6px;border-radius:5px;font-size:11px}
  .celebrate{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#fff,#f4f8ff);
    border:1px solid var(--accent-soft);border-left:4px solid var(--accent);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 20px;margin-bottom:22px;
    animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .celebrate .party{font-size:22px}
  .celebrate .t{font-size:14.5px;font-weight:650}
  .celebrate .s{font-size:12.5px;color:var(--muted)}
  .grouphd{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);
    font-weight:700;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .grouphd::after{content:"";flex:1;height:1px;background:var(--line)}
  .rail{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px}
  .rail.newtopic{border-style:dashed;box-shadow:none}
  .rail .rhd{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
  .rail h3{margin:0;font-size:15.5px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
    padding:3px 9px;border-radius:999px;background:#f1f3f5;color:var(--muted)}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .newtopic .track{display:flex;align-items:center;gap:0;margin:2px 0 12px}
  .newtopic .bead{width:24px;height:24px;border-radius:50%;background:var(--surface);
    border:2px dashed var(--ghost);opacity:.8}
  .newtopic .bead + .bead{margin-left:26px;position:relative}
  .newtopic .bead + .bead::before{content:"";position:absolute;top:11px;right:26px;width:26px;height:2px;
    background:repeating-linear-gradient(90deg,var(--ghost) 0 4px,transparent 4px 8px)}
  .newtopic .body{font-size:12.5px;color:var(--muted)}

  /* ---- flow dock ---- */
  .dock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:6px;
    background:#111418;border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(0,0,0,.28);z-index:50}
  .dock button{background:transparent;color:#c7ccd4;border:none;border-radius:999px;padding:7px 14px;
    font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .dock button.on{background:#fff;color:#111418}
  .dock .sep{width:1px;background:#333;margin:4px 2px}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="dock" id="dock"></div>

<script>
// The resolved ABSOLUTE root (decision a) — a real build derives this from the OS home +
// sync-folder probe; hard-coded here so the copyables are demonstrably terminal-reachable.
const ROOT_ABS = "/Users/amir/Library/Mobile Documents/com~apple~CloudDocs/iTeacher";
const ROOT_TILDE = "~/iCloud Drive/iTeacher";
const DETECTED = "iCloud Drive";       // null => falls back to plain ~/iTeacher, no subtitle

const stage = document.getElementById('stage');

function copyable(text, label){
  return `<div class="pathrow">
    <div class="pathfield">${text}</div>
    <button class="copy" data-copy="${text.replace(/"/g,'&quot;')}">${label||'Copy'}</button>
  </div>`;
}

// ---- (a) root confirm ----------------------------------------------------
function renderConfirm(){
  stage.innerHTML = `<div class="card">
    <p class="brand">Welcome to iTeacher</p>
    <h2>Where your learning lives</h2>
    <p>iTeacher keeps one folder for everything it teaches you. You can point Claude Code
       at this same folder from a terminal, so it stays a real, visible folder — never hidden away.</p>
    ${copyable(ROOT_ABS)}
    ${DETECTED ? `<p class="detected">Placed inside your <b>${DETECTED}</b> so it backs up and syncs automatically.</p>`
               : `<p class="detected">In your home folder.</p>`}
    <button class="btn block" data-go="handoff">Start here &rarr;</button>
    <div style="text-align:center;margin-top:12px">
      <button class="linkbtn" data-pick>Choose a different folder&hellip;</button>
    </div>
  </div>`;
}

// ---- (b) guided-lite hand-off + (c) waiting ------------------------------
function renderHandoff(){
  stage.innerHTML = `<div class="card dashed">
    <p class="brand">No topics yet</p>
    <h2>Ask Claude Code to teach you something</h2>
    <p>iTeacher shows a topic for each lesson-workspace in your folder. Claude Code writes them —
       here's the whole hand-off:</p>
    <ol class="steps">
      <li>
        <div class="lbl">Open a terminal in your iTeacher folder:</div>
        ${copyable(ROOT_ABS, 'Copy path')}
      </li>
      <li>
        <div class="lbl">Run <code>claude</code> to start Claude Code there.</div>
      </li>
      <li>
        <div class="lbl">Tell it what you want to learn — for example:</div>
        <div class="promptbox">
          <div class="pf">Teach me <span class="fill">&lt;your topic&gt;</span>. Use the teach skill.</div>
          <button class="copy" data-copy="Teach me <your topic>. Use the teach skill.">Copy</button>
        </div>
      </li>
    </ol>
    <div class="waiting"><span class="spinner"></span> Watching this folder — your first topic appears here automatically.</div>
  </div>`;
}

// ---- (c) celebration flip -> dashboard with #4 brand-new rail ------------
function renderArrived(){
  stage.innerHTML = `
    <div class="topbar"><h1>My Learning</h1><span class="sub">1 topic</span></div>
    <p class="roothint">Root: <code>${ROOT_TILDE}</code> · one topic per teach workspace</p>
    <div class="celebrate">
      <span class="party">🎉</span>
      <div>
        <div class="t">Your first topic is here!</div>
        <div class="s">Claude Code is authoring your first lesson — it'll light up the moment it's ready.</div>
      </div>
    </div>
    <div class="grouphd">In progress</div>
    <div class="rail newtopic">
      <div class="rhd"><h3>Landscape Photography</h3><span class="chip"><span class="dot"></span>new</span></div>
      <div class="track"><span class="bead"></span><span class="bead"></span><span class="bead"></span></div>
      <div class="body">Mission set — no lessons authored yet. The journey is drawn once teaching begins.</div>
    </div>`;
}

const STEPS = {confirm:renderConfirm, handoff:renderHandoff, arrived:renderArrived};
let cur = 'confirm';
function goto(step){ cur=step; STEPS[step](); paintDock(); window.scrollTo(0,0); }

// ---- dock: step through the flow + fire the "topic appeared" watcher event
function paintDock(){
  const items = [
    ['confirm','① Root confirm'],
    ['handoff','② Hand-off + waiting'],
    ['arrived','③ Topic appears']
  ];
  document.getElementById('dock').innerHTML =
    items.map(([k,l])=>`<button class="${k===cur?'on':''}" data-go="${k}">${l}</button>`).join('')
    + `<div class="sep"></div>`
    + `<button data-sim ${cur!=='handoff'?'disabled style="opacity:.4"':''}>▶ simulate MISSION.md appears</button>`;
}

document.addEventListener('click', e=>{
  const go = e.target.closest('[data-go]');
  if(go){ goto(go.dataset.go); return; }
  if(e.target.closest('[data-sim]') && cur==='handoff'){ goto('arrived'); return; }
  if(e.target.closest('[data-pick]')){
    alert('A real build opens the native OS folder picker here.\nThe chosen path is persisted to app config and shown back in this same field.');
    return;
  }
  const cp = e.target.closest('[data-copy]');
  if(cp){
    const t = cp.getAttribute('data-copy');
    navigator.clipboard && navigator.clipboard.writeText(t);
    const old = cp.textContent; cp.textContent='Copied ✓'; cp.classList.add('done');
    setTimeout(()=>{cp.textContent=old;cp.classList.remove('done');},1200);
  }
});

goto('confirm');
</script>
</body>
</html>
